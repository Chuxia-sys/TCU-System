# Render Blueprint for FEPC Scheduling System
# This file enables one-click deployment to Render

services:
  # Web Service (Next.js Application)
  - type: web
    name: fepc-scheduling
    env: node
    region: oregon # or singapore, frankfurt, etc.
    plan: free # or starter, standard, etc.
    buildCommand: bun install && bun run render-build
    startCommand: bun run render-start
    healthCheckPath: /api/health
    
    # Environment Variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fepc-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true # Auto-generate a secure secret
      - key: NEXTAUTH_URL
        value: https://fepc-scheduling.onrender.com # Update with your domain

# PostgreSQL Database
databases:
  - name: fepc-db
    region: oregon # Same region as web service
    plan: free # or starter, standard, etc.
    user: fepc_user
    databaseName: fepc_scheduling

# Optional: Redis for caching/sessions
# - type: redis
#   name: fepc-redis
#   region: oregon
#   plan: free
#   maxmemoryPolicy: allkeys-lru
