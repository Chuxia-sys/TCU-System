# Exported from Render on 2026-05-21T11:16:28Z
version: "1"
services:
- type: web
  name: tcu-scheduler
  runtime: node
  repo: https://github.com/Chuxia-sys/TCU-System
  plan: free
  envVars:
  - key: NEXT_PUBLIC_FIREBASE_APP_ID
    sync: false
  - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    sync: false
  - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    sync: false
  - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    sync: false
  - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    sync: false
  - key: NEXT_PUBLIC_FIREBASE_API_KEY
    sync: false
  - key: DATABASE_URL
    sync: false
  - key: NODE_ENV
    sync: false
  - key: CLEANUP_API_KEY
    sync: false
  - key: NOTIFICATIONS_TTL_DAYS
    value: "30"
  - key: AUDIT_LOGS_TTL_DAYS
    value: "60"
  region: oregon
  buildCommand: npm ci && npm run build
  startCommand: npm start
  autoDeployTrigger: commit

# ── Daily TTL Cleanup Cron ──────────────────────────────────
# Backup trigger for the built-in node-cron scheduler.
# Runs daily at midnight to ensure expired notifications and
# audit logs are purged even if the server was restarting during
# the node-cron window.
- type: cron
  name: ttl-cleanup
  runtime: node
  schedule: "0 0 * * *"
  url: https://tcu-scheduler.onrender.com/api/cleanup
  headers:
    - key: Authorization
      value: Bearer ${CLEANUP_API_KEY}
  plan: free
